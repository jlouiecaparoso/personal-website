:root {
  /* ---------- Brand palette ---------- */
  --yellow-500: #FFD93D;          /* sunshine yellow — primary brand */
  --yellow-400: #FFE070;
  --yellow-300: #FFEBA0;
  --yellow-200: #FFF4CC;
  --yellow-100: #FFFAE6;
  --yellow-700: #E0B800;          /* hover / press */

  --lime-500:   #A8E05F;          /* lime green — primary brand */
  --lime-400:   #BEE883;
  --lime-300:   #D4F0A8;
  --lime-200:   #E6F6C9;
  --lime-100:   #F3FBE6;
  --lime-700:   #7FBA34;          /* hover / press */

  /* ---------- Accent palette ---------- */
  --ocean-500:  #4ECDC4;          /* CTAs */
  --ocean-700:  #2BA8A0;
  --ocean-100:  #E1F7F5;

  --coral-500:  #FF6B6B;          /* metrics / data callouts */
  --coral-700:  #D94848;
  --coral-100:  #FFE5E5;

  /* ---------- Neutrals (80% of layouts) ---------- */
  --white:      #FFFFFF;
  --cream:      #FFFCF5;          /* warm canvas */
  --gray-50:    #F7F7F5;
  --gray-100:   #EFEFEC;
  --gray-200:   #E2E2DE;
  --gray-300:   #CACAC4;
  --gray-400:   #9C9C95;
  --gray-500:   #6E6E68;
  --gray-600:   #4D4D48;
  --gray-700:   #34342F;
  --gray-800:   #1F1F1C;
  --gray-900:   #111110;          /* near-black ink */

  /* ---------- Semantic surfaces ---------- */
  --bg:           var(--cream);
  --bg-elevated:  var(--white);
  --bg-muted:     var(--gray-50);
  --bg-inverse:   var(--gray-900);

  /* ---------- Semantic foreground ---------- */
  --fg-1:         var(--gray-900);  /* primary text */
  --fg-2:         var(--gray-600);  /* secondary text */
  --fg-3:         var(--gray-400);  /* tertiary / muted */
  --fg-inverse:   var(--cream);
  --fg-link:      var(--ocean-700);

  /* ---------- Semantic accent ---------- */
  --accent:        var(--yellow-500);
  --accent-soft:   var(--yellow-200);
  --accent-2:      var(--lime-500);
  --accent-2-soft: var(--lime-200);
  --cta:           var(--ocean-500);
  --cta-hover:     var(--ocean-700);
  --metric:        var(--coral-500);

  /* ---------- Status (derived, used sparingly) ---------- */
  --success: var(--lime-700);
  --warning: var(--yellow-700);
  --danger:  var(--coral-500);
  --info:    var(--ocean-500);

  /* ---------- Borders ---------- */
  --border:        var(--gray-200);
  --border-strong: var(--gray-300);
  --border-ink:    var(--gray-900);

  /* ---------- Type families ---------- */
  --font-display: 'Space Grotesk', ui-sans-serif, system-ui, sans-serif;
  --font-body:    'Inter', ui-sans-serif, system-ui, sans-serif;
  --font-mono:    'DM Mono', ui-monospace, 'SFMono-Regular', Menlo, monospace;

  /* ---------- Type scale (px @ 16px root) ---------- */
  --fs-xs:   12px;
  --fs-sm:   14px;
  --fs-md:   16px;
  --fs-lg:   18px;
  --fs-xl:   22px;
  --fs-2xl:  28px;
  --fs-3xl:  36px;
  --fs-4xl:  48px;
  --fs-5xl:  64px;
  --fs-6xl:  84px;

  /* ---------- Weights ---------- */
  --w-light:    300;
  --w-regular:  400;
  --w-medium:   500;
  --w-semibold: 600;
  --w-bold:     700;

  /* ---------- Tracking ---------- */
  --tr-tight:   -0.02em;
  --tr-snug:    -0.01em;
  --tr-normal:  0;
  --tr-wide:    0.04em;
  --tr-eyebrow: 0.12em;

  /* ---------- Line heights ---------- */
  --lh-tight:   1.05;
  --lh-snug:    1.2;
  --lh-normal:  1.5;
  --lh-relaxed: 1.65;

  /* ---------- Spacing (4-px base) ---------- */
  --s-1:  4px;
  --s-2:  8px;
  --s-3:  12px;
  --s-4:  16px;
  --s-5:  24px;
  --s-6:  32px;
  --s-7:  48px;
  --s-8:  64px;
  --s-9:  96px;
  --s-10: 128px;

  /* ---------- Radii ---------- */
  --r-xs:    4px;
  --r-sm:    8px;
  --r-md:    14px;
  --r-lg:    20px;
  --r-xl:    28px;
  --r-pill:  999px;

  /* ---------- Shadows ---------- */
  --shadow-xs: 0 1px 2px rgba(17,17,16,0.06);
  --shadow-sm: 0 2px 6px rgba(17,17,16,0.06), 0 1px 2px rgba(17,17,16,0.04);
  --shadow-md: 0 8px 20px rgba(17,17,16,0.08), 0 2px 4px rgba(17,17,16,0.04);
  --shadow-lg: 0 18px 40px rgba(17,17,16,0.10), 0 4px 8px rgba(17,17,16,0.04);
  --shadow-pop-yellow: 6px 6px 0 var(--gray-900);   /* signature "stacked" shadow */
  --shadow-pop-lime:   6px 6px 0 var(--lime-700);
  --shadow-pop-ocean:  6px 6px 0 var(--ocean-700);

  /* ---------- Motion ---------- */
  --ease-out:    cubic-bezier(0.22, 1, 0.36, 1);
  --ease-in-out: cubic-bezier(0.65, 0, 0.35, 1);
  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  --dur-fast:    140ms;
  --dur-base:    220ms;
  --dur-slow:    420ms;
}

/* ============================================================
   Semantic type roles
   ============================================================ */

html, body {
  font-family: var(--font-body);
  font-size: var(--fs-md);
  line-height: var(--lh-normal);
  color: var(--fg-1);
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
}

.t-display {
  font-family: var(--font-display);
  font-size: var(--fs-6xl);
  font-weight: var(--w-bold);
  line-height: var(--lh-tight);
  letter-spacing: var(--tr-tight);
}

.t-h1 {
  font-family: var(--font-display);
  font-size: var(--fs-4xl);
  font-weight: var(--w-bold);
  line-height: var(--lh-tight);
  letter-spacing: var(--tr-tight);
}

.t-h2 {
  font-family: var(--font-display);
  font-size: var(--fs-3xl);
  font-weight: var(--w-semibold);
  line-height: var(--lh-snug);
  letter-spacing: var(--tr-snug);
}

.t-h3 {
  font-family: var(--font-display);
  font-size: var(--fs-2xl);
  font-weight: var(--w-semibold);
  line-height: var(--lh-snug);
}

.t-h4 {
  font-family: var(--font-display);
  font-size: var(--fs-xl);
  font-weight: var(--w-medium);
  line-height: var(--lh-snug);
}

.t-eyebrow {
  font-family: var(--font-mono);
  font-size: var(--fs-xs);
  font-weight: var(--w-medium);
  letter-spacing: var(--tr-eyebrow);
  text-transform: uppercase;
  color: var(--fg-2);
}

.t-lead {
  font-family: var(--font-body);
  font-size: var(--fs-xl);
  font-weight: var(--w-regular);
  line-height: var(--lh-relaxed);
  color: var(--fg-2);
}

.t-body {
  font-family: var(--font-body);
  font-size: var(--fs-md);
  font-weight: var(--w-regular);
  line-height: var(--lh-relaxed);
  color: var(--fg-1);
}

.t-small {
  font-family: var(--font-body);
  font-size: var(--fs-sm);
  color: var(--fg-2);
}

.t-mono {
  font-family: var(--font-mono);
  font-size: var(--fs-sm);
  letter-spacing: 0;
}

.t-metric {
  font-family: var(--font-display);
  font-size: var(--fs-5xl);
  font-weight: var(--w-bold);
  line-height: 1;
  letter-spacing: var(--tr-tight);
  color: var(--coral-500);
  font-feature-settings: "tnum" 1;
}

.t-metric-label {
  font-family: var(--font-mono);
  font-size: var(--fs-xs);
  text-transform: uppercase;
  letter-spacing: var(--tr-eyebrow);
  color: var(--fg-2);
}
</style>

    * { box-sizing: border-box; }

    a { cursor: pointer; }

    .gz-btn { transition: transform .14s var(--ease-out), box-shadow .14s var(--ease-out), background .14s; }
    .gz-btn:hover { transform: translate(-1px, -1px); box-shadow: 6px 6px 0 var(--gray-900) !important; }
    .gz-btn:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0 var(--gray-900) !important; }

    @keyframes gz-pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%      { opacity: .5; transform: scale(.85); }
    }
    .gz-pulse { animation: gz-pulse 1.8s ease-in-out infinite; }

    @keyframes gz-ticker {
      from { transform: translateX(0); }
      to   { transform: translateX(-50%); }
    }
    .gz-ticker { animation: gz-ticker 60s linear infinite; width: max-content; }

    /* density */
    [data-density="compact"] section { padding-top: 56px !important; padding-bottom: 20px !important; }
    [data-density="airy"]    section { padding-top: 128px !important; padding-bottom: 64px !important; }

    /* selection */
    ::selection { background: var(--yellow-500); color: var(--gray-900); }
    ::-moz-selection { background: var(--yellow-500); color: var(--gray-900); }

    input::placeholder, textarea::placeholder { color: var(--fg-3); }
    input:focus, textarea:focus { outline: 2px solid var(--ocean-500); outline-offset: 2px; }

    /* ============================================================
       Mobile responsiveness layout overrides
       ============================================================ */
    @media (max-width: 768px) {
      /* General layout & spacing */
      section {
        padding-left: 20px !important;
        padding-right: 20px !important;
      }
      
      /* Navigation Bar */
      .gz-nav-container {
        flex-direction: column !important;
        gap: 14px !important;
        align-items: center !important;
        padding: 10px 0 !important;
      }
      
      /* Hero Section */
      .gz-hero-grid {
        grid-template-columns: 1fr !important;
        gap: 36px !important;
      }
      
      /* Case Detail Drawer */
      .gz-casedetail-grid {
        grid-template-columns: 1fr !important;
        gap: 28px !important;
        padding: 24px 20px 28px !important;
      }
      
      /* Featured Case Study Card */
      .gz-featured-grid {
        grid-template-columns: 1fr !important;
      }
      .gz-featured-grid > div {
        padding: 24px 20px !important;
      }
      
      /* Secondary Cases Grid */
      .gz-work-grid {
        grid-template-columns: 1fr !important;
        gap: 24px !important;
      }
      
      /* Services Section */
      .gz-services-grid {
        grid-template-columns: 1fr !important;
        gap: 24px !important;
      }
      .gz-deliverables-list {
        grid-template-columns: 1fr !important;
      }
      
      /* Workflow Steps Grid */
      .gz-workflow-grid {
        grid-template-columns: 1fr !important;
        gap: 24px !important;

      .gz-about-grid {
        grid-template-columns: 1fr !important;
        gap: 36px !important;

        position: static !important; /* unstick profile card on mobile */

      .gz-experience-row {
        grid-template-columns: 1fr !important;

      .gz-press-grid {
        grid-template-columns: 1fr !important;

      /* Contact Form Layout */
      .gz-contact-grid {

        grid-template-columns: 1fr !important;

        flex-direction: column !important;
        gap: 12px !important;
        align-items: flex-start !important;
      }
    }
